# Kubernetes Secrets
# Reference: kubectl create secret generic <name> --from-literal=key=value
---
apiVersion: v1
kind: Secret
metadata:
  name: ecommerce-db-secret
  namespace: ecommerce
type: Opaque
stringData:
  # Generate a strong password: openssl rand -base64 32
  postgres-password: "your-secure-password-here"
  ecommerce-user-password: "your-secure-password-here"

---
apiVersion: v1
kind: Secret
metadata:
  name: ecommerce-rabbitmq-secret
  namespace: ecommerce
type: Opaque
stringData:
  rabbitmq-password: "your-secure-password-here"
  rabbitmq-management-password: "your-secure-password-here"

---
apiVersion: v1
kind: Secret
metadata:
  name: ecommerce-jwt-secret
  namespace: ecommerce
type: Opaque
stringData:
  # Generate: openssl rand -base64 64
  secret-key: "your-secure-secret-key-here"

---
apiVersion: v1
kind: Secret
metadata:
  name: ecommerce-payment-secret
  namespace: ecommerce
type: Opaque
stringData:
  # Configure these for production
  stripe-api-key: "sk_test_your-stripe-api-key"
  stripe-webhook-secret: "whsec_your-webhook-secret"

---
apiVersion: v1
kind: Secret
metadata:
  name: ecommerce-tls-secret
  namespace: ecommerce
type: kubernetes.io/tls
# Generate with: openssl req -x509 -nodes -days 365 -newkey rsa:2048 -keyout tls.key -out tls.crt
data:
  # Add your TLS certificate and key as base64 encoded values
  tls.crt: "LS0tLS1CRUdJTiBDRVJUSUZJQ0FURS0tLS0tCg=="
  tls.key: "LS0tLS1CRUdJTiBQUklWQVRFIEtFWS0tLS0tCg=="

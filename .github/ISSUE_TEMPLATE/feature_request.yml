name: ✨ Feature Request
description: Suggest a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement", "triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature! We value your input.
  - type: textarea
    id: problem
    attributes:
      label: 🎯 Problem Statement
      description: What problem does this feature solve?
      placeholder: I'm always frustrated when...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 💡 Proposed Solution
      description: Describe the solution you'd like.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 🔄 Alternatives Considered
      description: Any alternative solutions or features you've considered.
  - type: dropdown
    id: scope
    attributes:
      label: 🏗️ Scope
      options:
        - Frontend
        - Backend
        - Infrastructure
        - Documentation
        - CI/CD
        - Cross-cutting
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: ⚡ Priority
      options:
        - Low — nice to have
        - Medium — improves experience
        - High — significantly impacts workflow
        - Critical — blocking
  - type: textarea
    id: context
    attributes:
      label: 📎 Additional Context
      description: Add any mockups, screenshots, or related links.
  - type: checkboxes
    id: terms
    attributes:
      label: ✅ Checklist
      options:
        - label: I have searched for existing feature requests
          required: true

name: 🐛 Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill out the form below to help us investigate.
  - type: textarea
    id: description
    attributes:
      label: 🐛 Bug Description
      description: A clear and concise description of the bug.
      placeholder: Describe the bug...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 📋 Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: ✅ Expected Behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: ❌ Actual Behavior
      description: What actually happened.
    validations:
      required: true
  - type: dropdown
    id: service
    attributes:
      label: 🏗️ Affected Service
      options:
        - Frontend (Next.js)
        - API Gateway
        - User Service
        - Product Service
        - Cart Service
        - Order Service
        - Payment Service
        - Notification Service
        - Infrastructure / Docker
        - Multiple Services
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 📄 Logs / Error Output
      description: Paste any relevant logs or error output.
      render: shell
  - type: textarea
    id: environment
    attributes:
      label: 🖥️ Environment
      description: |
        - OS: [e.g., Ubuntu 22.04]
        - Docker version: [e.g., 24.0.5]
        - Node version: [e.g., 20.x]
        - Python version: [e.g., 3.11]
        - Browser: [e.g., Chrome 120]
  - type: textarea
    id: screenshots
    attributes:
      label: 📸 Screenshots
      description: If applicable, add screenshots.
  - type: checkboxes
    id: terms
    attributes:
      label: ✅ Checklist
      options:
        - label: I have searched for existing issues
          required: true
        - label: I have included steps to reproduce
          required: true

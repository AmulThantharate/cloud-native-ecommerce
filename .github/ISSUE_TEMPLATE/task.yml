name: 🔧 Task / Chore
description: Internal task, refactor, or maintenance work
title: "[Chore]: "
labels: ["chore"]
assignees: []
body:
  - type: textarea
    id: description
    attributes:
      label: 📋 Task Description
      description: What needs to be done?
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: 🎯 Motivation
      description: Why is this task needed?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: ✅ Acceptance Criteria
      description: What does "done" look like?
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
  - type: dropdown
    id: category
    attributes:
      label: 🏷️ Category
      options:
        - Refactoring
        - Dependency update
        - CI/CD improvement
        - Documentation
        - Performance
        - Security hardening
        - Tech debt
        - Testing
    validations:
      required: true
